name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install pandas numpy scikit-learn lightgbm pydantic pytest pytest-cov ruff
      - name: Lint
        run: ruff check src/ tests/ api/ app/ --ignore E501
        continue-on-error: true
      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=src --cov=api --cov-report=term-missing
